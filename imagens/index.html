<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagens</title>
    <link rel="shortcut icon" href="favicon01.png" type="image/x-icon">
    <style>
        h1 {
            
        }

        ul {
		    width: 700px;
		    margin: 0 auto;
		    padding: 50px;
		    overflow: hidden;
		    list-style: none;
	    }

	    ul li {
		    float: left;
		    width: 200px;
		    height: 200px;
		    margin: 10px;
		    border: 5px solid #ffffff;
		    background-color: #ffffff;
		    box-shadow: 1px 1px 3px rgba(0,0,0,.4);
	    }

	    ul li#foto01 {
		    background: url('base.jpeg') no-repeat;
		    background-position: 50% 50%;
		    background-size: 400px 400px;
		    background-color: #ffffff;
	    }
	   
        ul li#foto01:hover {
		    background-position: 0px 0px;
		    background-size: 200px 200px;
	    }

	    ul li#foto02 {
		    background: url('ceo-acesso.jpeg') no-repeat;
	    	background-position: 50% 50%;
		    background-size: 400px 400px;
		    background-color: #ffffff;
	    }
	    ul li#foto02:hover {
		    background-position: 0px 0px;
		    background-size: 200px 200px;
	    }

	    ul li#foto03 {
		    background: url('rack-ruropolis.jpeg') no-repeat;
		    background-position: 50% 50%;
		    background-size: 400px 400px;
		    background-color: #ffffff;
	    }

	    ul#album-fotos li#foto03:hover {
		    background-position: 0px 0px;
		    background-size: 200px 200px;
	    }

        ul li#foto04 {
		    background: url('rack-ruropolis.jpeg') no-repeat;
		    background-position: 50% 50%;
		    background-size: 400px 400px;
		    background-color: #ffffff;
	    }
        
	    ul#album-fotos li#foto04:hover {
		    background-position: 0px 0px;
		    background-size: 200px 200px;
	    }

        ul li#foto05 {
		    background: url('rack-ruropolis.jpeg') no-repeat;
		    background-position: 50% 50%;
		    background-size: 400px 400px;
		    background-color: #ffffff;
	    }
        
	    ul#album-fotos li#foto05:hover {
		    background-position: 0px 0px;
		    background-size: 200px 200px;
	    }

        ul li span {
		    opacity: 0;
		    color: #ffffff;
		    text-shadow: 1px 1px 1px #000000;
	    	background-color: rgba(0,0,0,.3);
	    	font-size: 9pt;
	    	line-height: 370px;
	    	padding: 5px;
	    }
	    ul li:hover span {
    		opacity: 1;
    	}
    </style>
</head>
<body>
    <main>
        <h1>Album de fotos</h1>
        <ul>
            <li id="foto01"><span>Base de Rurópolis<span></li>
            <li id="foto02"><span>CEO de acesso<span></li>
            <li id="foto03"><span>Rack Rurópolis<span></li>
	        <li id="foto04"><span>Rack Divinópolis<span></li>
	        <li id="foto05"><span>Pop Campo Verde<span></li>
        </ul>
    </main>
</body>
</html>
