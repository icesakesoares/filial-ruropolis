<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagens</title>
    <link rel="shortcut icon" href="fotos/favicon01.png" type="image/x-icon">
    <style>
		body {
			background-color: rgb(160, 157, 157);
		}

		 img{
            width: 100px;
            height: 100px;
            margin-top: -90px;
            padding: 0px;
            display: block;
            float: right;
            border-radius: 50px;
        }
        nav > a{
           color: rgb(207, 103, 6);
           padding: 10px;
           text-decoration: none;
           font-weight: bold;
           border-radius: 5px;
        }
        a:hover{
            color: blue;
            background-color: white;
            text-decoration: underline;
        }

		div {
			border-bottom: 1px solid black;
		}

		main {
			background-color: white;
            padding: 10px;
            margin: auto;
            width: 950px;
            box-shadow: 5px 1px 3px rgba(0, 0, 0, 0.411);
			border-radius: 10px;
		}

        h1 {
            color: rgb(245, 127, 17);
            font-size: 3.5em;
            font-weight: bolder;
            text-align: center;
            text-shadow: 1px 1px 3px black;
        }

        ul {
		    width: 700px;
		    margin: 0 auto;
		    padding: 50px;
		    overflow: hidden;
		    list-style: none;
	    }

	    ul li {
		    float: left;
		    width: 200px;
		    height: 200px;
		    margin: 10px;
		    border: 5px solid #ffffff;
		    background-color: #ffffff;
		    box-shadow: 1px 1px 3px rgba(0,0,0,.4);
	    }

	    ul li#foto01 {
		    background: url('fotos/base1000.jpeg') no-repeat;
		    background-position: 50% 50%;
		    background-size: 400px 400px;
		    background-color: #ffffff;
	    }
	   
        ul li#foto01:hover {
		    background-position: 0px 0px;
		    background-size: 400px 400px;
	    }

	    ul li#foto02 {
		    background: url('fotos/ceo-acesso1000.jpeg') no-repeat;
	    	background-position: 50% 50%;
		    background-size: 400px 400px;
		    background-color: #ffffff;
	    }
	    ul li#foto02:hover {
		    background-position: 0px 0px;
		    background-size: 200px 200px;
	    }

	    ul li#foto03 {
		    background: url('fotos/rack-ruropolis1000.jpeg') no-repeat;
		    background-position: 50% 50%;
		    background-size: 800px 800px;
		    background-color: #ffffff;
	    }

	    ul li#foto03:hover {
		    background-position: 0px 0px;
		    background-size: 200px 200px;
	    }

        ul li#foto04 {
		    background: url('fotos/rack-km701000.jpeg') no-repeat;
		    background-position: 50% 50%;
		    background-size: 400px 400px;
		    background-color: #ffffff;
	    }
        
	    ul li#foto04:hover {
		    background-position: 0px 0px;
		    background-size: 200px 200px;
	    }

        ul li#foto05 {
		    background: url('fotos/rack-km301000.jpeg') no-repeat;
		    background-position: 50% 50%;
		    background-size: 400px 400px;
		    background-color: #ffffff;
	    }
        
	    ul li#foto05:hover {
		    background-position: 0px 0px;
		    background-size: 200px 200px;
	    }

        ul li span {
		    opacity: 0;
		    color: #ffffff;
		    text-shadow: 1px 1px 1px #000000;
	    	background-color: rgba(0,0,0,.3);
	    	font-size: 9pt;
	    	line-height: 370px;
	    	padding: 5px;
	    }
	    ul li:hover span {
    		opacity: 1;
    	}
    </style>
</head>
<body>
    <main>
		<div>
			<h1>Album de fotos</h1>
			<img src="fotos/logo1.jpg" alt="WSP">
			<nav>
						<a href="../index.html">HOME</a>
						<a href="index.html">FOTOS</a>
						<a href="../2025/index.html">VR.2025</a>
					</nav>
		</div>
        <ul>
            <li id="foto01"><span>Base de Rurópolis<span></li>
            <li id="foto02"><span>CEO de acesso<span></li>
            <li id="foto03"><span>Rack Rurópolis<span></li>
	        <li id="foto04"><span>Rack Divinópolis<span></li>
	        <li id="foto05"><span>Pop Campo Verde<span></li>
        </ul>
    </main>
</body>
</html>
